# Observation helper for A2 (DNS) / A3 (network) — a shell-capable pod in the fault's target
# namespace so you can exec nslookup/wget against the registry before/during/after a fault.
# This is an observability helper (busybox from Docker Hub), not an image from the registry.
apiVersion: v1
kind: Pod
metadata:
  name: dns-probe
  labels:
    app: dns-probe
    role: chaos-target
spec:
  containers:
    - name: probe
      image: busybox:1.36
      command: ["sleep", "36000"]
      resources:
        requests:
          cpu: "10m"
          memory: "16Mi"
